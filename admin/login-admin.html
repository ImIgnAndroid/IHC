<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Iniciar sesión en BiblioPerú - Sistema de gestión bibliotecaria.">
  <title>Iniciar sesión - BiblioPerú</title>
  <link rel="stylesheet" href="../assets/css/styles-admin.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <h2>BIBLIOPERÚ</h2>
    <h3>Acceso administrativo</h3>
    <p class="admin-page-tip">Ingresa tus credenciales para entrar al panel y gestionar usuarios y libros.</p>
    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="admin@biblioperu.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <div class="admin-form-actions">
        <button type="submit" class="button primary">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span>Iniciar sesión</span>
        </button>
      </div>
    </form>
    <div class="divider"></div>
    <p class="login-hint">Credenciales de ejemplo: <strong>admin@biblioperu.com</strong> / <strong>admin123</strong></p>
    <a class="login-link" href="../public/login.html">
      <i class="fa-solid fa-arrow-left"></i>
      <span>Volver al acceso público</span>
    </a>
  </div>
</div>
<script src="../assets/js/scripts-admin.js"></script>
</body>
</html>
